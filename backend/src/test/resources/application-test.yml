spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:3025}
    username: ${MAIL_USERNAME:test@example.com}
    password: ${MAIL_PASSWORD:test}

admin:
  username: ${INITIAL_ADMIN_USERNAME:admin}
  nickname: ${INITIAL_ADMIN_NICKNAME:Admin}
  password: ${INITIAL_ADMIN_PASSWORD:admin1234!}

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctaXMtcmVxdWlyZWQtZm9yLWhzMjU2}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
